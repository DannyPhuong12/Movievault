<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${movie.title}">Movie Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">

        <div class="nav">
            <div>
                <a href="/movies" th:text="#{nav.movies}">Movies</a>
                <a href="/genres" th:text="#{nav.genres}">Genres</a>
            </div>
            <div>
                <a th:href="@{/movies(lang='fi')}" th:text="#{lang.fi}">Suomi</a>
                <a th:href="@{/movies(lang='en')}" th:text="#{lang.en}">English</a>
                <a sec:authorize="isAuthenticated()" href="/logout">Logout</a>
                <a sec:authorize="!isAuthenticated()" href="/login">Login</a>
            </div>
        </div>

        <h1 th:text="${movie.title}">Movie Title</h1>

        <table>
            <tr>
                <th>Director</th>
                <td th:text="${movie.director}"></td>
            </tr>
            <tr>
                <th>Year</th>
                <td th:text="${movie.releaseYear}"></td>
            </tr>
            <tr>
                <th>Genre</th>
                <td th:text="${movie.genre != null ? movie.genre.name : 'N/A'}"></td>
            </tr>
        </table>

        <h2>Reviews</h2>

        <div th:if="${#lists.isEmpty(reviews)}">
            <p>No reviews yet.</p>
        </div>

        <table th:unless="${#lists.isEmpty(reviews)}">
            <tr>
                <th>User</th>
                <th>Rating</th>
                <th>Comment</th>
            </tr>
            <tr th:each="review : ${reviews}">
                <td th:text="${review.user.username}"></td>
                <td th:text="${review.rating}"></td>
                <td th:text="${review.comment}"></td>
            </tr>
        </table>

        <div class="actions">
            <a th:href="@{/movies/{id}/reviews/add(id=${movie.id})}"
               class="button"
               sec:authorize="isAuthenticated()">Add Review</a>
            <a th:href="@{/movies/edit/{id}(id=${movie.id})}"
               class="button"
               sec:authorize="hasRole('ADMIN')">Edit Movie</a>
            <a href="/movies" class="button">Back to movies</a>
        </div>

    </div>
</body>
</html>
