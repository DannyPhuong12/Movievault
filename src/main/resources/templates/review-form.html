<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Review</title>
</head>
<body>

<h1>Add Review</h1>

<h2 th:text="${movie.title}">Movie Title</h2>

<form th:action="@{/movies/{movieId}/reviews/add(movieId=${movie.id})}" th:object="${review}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div>
        <label for="rating">Rating (1-5)</label><br>
        <input id="rating" type="number" th:field="*{rating}" min="1" max="5" required>
    </div>

    <div>
        <label for="comment">Comment</label><br>
        <textarea id="comment" th:field="*{comment}" rows="4" cols="40"></textarea>
    </div>

    <div>
        <button type="submit">Save review</button>
    </div>
</form>

<br>
<a th:href="@{/movies/{id}(id=${movie.id})}">Back to movie details</a>

</body>
</html>
